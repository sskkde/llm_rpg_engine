name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        run: make test-backend

      - name: Run scenario smoke tests
        run: make test-scenario-smoke

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests (lint, typecheck, unit)
        run: make test-frontend

  pgvector-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_DB: llm_rpg
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run database migrations
        run: cd backend && alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/llm_rpg

      - name: Run pgvector tests
        run: make test-pgvector
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/llm_rpg
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
