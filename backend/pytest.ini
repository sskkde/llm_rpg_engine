[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may use database)
    slow: Slow tests (skipped by default)
