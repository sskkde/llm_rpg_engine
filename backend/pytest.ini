[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may use database)
    slow: Slow tests (skipped by default)
    smoke: Smoke tests (fast scenario validation, default for scenario smoke)
    scenario: Scenario tests (integration scenarios)
    pgvector: pgvector extension tests (requires PostgreSQL)
    e2e: End-to-end tests (requires full stack)
    regression: Regression tests (P4 content feature validation)
    full: Full test suite (includes slower regression tests)
